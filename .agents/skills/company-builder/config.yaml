# Company Builder Configuration
# Edit to tune parallelism, agent counts, models, etc.

# Global execution settings
codex:
  max_parallel: 3                    # Max concurrent Codex processes (laptop GPU safe)
  timeout_seconds: 300                 # Per-agent timeout

# Phase configurations
phases:
  pain_hunt:
    researchers: 10
    problems_per_researcher: 5
    sources:
      - reddit
      - hackernews
      - g2
      - trustpilot
      - twitter
      - shopify_forums
      - app_store
      - google_play
      - quora
      - indiehackers
    max_parallel: 3
    output:
      raw: "pain-hunt/raw.md"
      candidates: "pain-hunt/candidates.md"
      
  tournament:
    judges: 5
    criteria:
      - pain
      - urgency
      - reachability
      - willingness_to_pay
      - buildability
      - incumbent_weakness
    top_k: 4
    final_judges: 3
    output:
      scores: "tournament/scores.md"
      winner: "tournament/winner.md"
      
  business_design:
    researchers: 3
    focus_areas:
      - competitors
      - platform_apis
      - regulations
      - unit_economics
    max_parallel: 3
    output:
      plan: "business-design/business-plan.md"
      
  brand:
    logo_iterations: 6
    domain_check: true
    domain_tlds: [".com", ".io", ".co"]
    output:
      guide: "brand/brand-guide.md"
      logo: "brand/logo.svg"
      
  landing_page:
    include_demo: true
    include_pricing: true
    include_faq: true
    max_parallel: 3
    output:
      dir: "product"
      
  launch_video:
    script_only: true               # No video generation without API keys
    output:
      script: "videos/launch-script.md"
      
  founder_video:
    script_only: true
    output:
      script: "videos/founder-script.md"
      
  red_team:
    skeptics: 6
    attack_vectors:
      - tam
      - pricing
      - tech_feasibility
      - distribution
      - legal
      - retention
    max_parallel: 3
    output:
      verdict: "red-team/verdict.md"
      fixes: "red-team/fixes.md"
      
  recap:
    include_all_artifacts: true
    output:
      html: "recap/index.html"