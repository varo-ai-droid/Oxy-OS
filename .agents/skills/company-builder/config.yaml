# Company Builder Configuration
# Edit to tune parallelism, agent counts, models, etc.

# Global execution settings
execution:
  parallelism: 3                    # Max concurrent Codex processes (laptop GPU safe)
  default_timeout_seconds: 300      # Per-agent timeout
  retry_attempts: 2                 # Retries per agent on failure
  retry_delay_seconds: 30           # Delay between retries
  checkpoint_every_phase: true      # Save state.json after each phase

# Phase configurations
phases:
  pain_hunt:
    researchers: 10
    sources:
      - reddit
      - hackernews
      - g2
      - trustpilot
      - twitter
      - shopify_forums
      - app_store
      - google_play
      - quora
      - indiehackers
    max_problems_per_researcher: 5
    dedup_threshold: 0.7            # Similarity threshold for dedup
    
  tournament:
    judges: 5
    criteria:
      - pain
      - urgency
      - reachability
      - willingness_to_pay
      - buildability
      - incumbent_weakness
    top_k: 4
    final_judges: 3
    
  business_design:
    researchers: 3
    focus_areas:
      - competitors
      - platform_apis
      - regulations
      - unit_economics
      
  brand:
    logo_iterations: 6
    domain_check: true
    domain_tlds: [".com", ".io", ".co"]
    
  landing_page:
    include_demo: true
    include_pricing: true
    include_faq: true
    
  launch_video:
    script_only: true               # No video generation without API keys
    
  founder_video:
    script_only: true
    
  red_team:
    skeptics: 6
    attack_vectors:
      - tam
      - pricing
      - tech_feasibility
      - distribution
      - legal
      - retention
      
  recap:
    include_all_artifacts: true

# Model preferences per phase type
models:
  research: "sonnet"       # Fast, good for research
  creative: "sonnet"       # Brand, landing page
  reasoning: "opus"        # Tournament, red team (if available)
  default: "sonnet"

# Output paths (relative to skill directory)
output:
  base: "output"
  phases:
    pain_hunt: "pain-hunt"
    tournament: "tournament"
    business_design: "business-design"
    brand: "brand"
    landing_page: "product"
    launch_video: "videos"
    founder_video: "videos"
    red_team: "red-team"
    recap: "recap"