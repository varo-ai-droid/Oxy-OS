<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Oxy Dashboard</title>
<style>
:root {
  --bg: #000000;
  --card: #1C1C1E;
  --border: #2C2C2E;
  --text: #FFFFFF;
  --muted: #8E8E93;
  --dim: #48484A;
  --radius: 16px;
  --gap: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --ease: 200ms cubic-bezier(0.25,0.46,0.45,0.94);
  --fab: 56px;
  --accent: #007AFF;
}

@media (prefers-reduced-motion: reduce) { :root { --ease: 0ms; } }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; background: var(--bg); }

body {
  font: 17px/1.47 -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#app { min-height: 100vh; display: flex; flex-direction: column; }

.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: var(--gap);
  padding: var(--gap);
  padding-bottom: calc(var(--gap) + var(--fab) + 24px);
  align-content: start;
}

@media (min-width: 480px)  { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
@media (min-width: 900px)  { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
@media (min-width: 1200px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

/* Widget */
.widget {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  cursor: grab;
  transition: transform var(--ease), box-shadow var(--ease);
  position: relative;
}

.widget.dragging { opacity: 0.5; transform: scale(1.02); box-shadow: 0 16px 48px rgba(0,0,0,0.5); z-index: 100; cursor: grabbing; }
.widget.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), var(--shadow); }

/* Wiggle */
@keyframes wiggle { 0%,100% { transform: rotate(-0.5deg) scale(1.01); } 50% { transform: rotate(0.5deg) scale(1.01); } }
.wiggle .widget { animation: wiggle 1.2s ease-in-out infinite; animation-delay: calc(var(--i) * 80ms); }

.delete-btn {
  position: absolute; top: -10px; right: -10px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,59,48,0.9); border: 2px solid var(--bg);
  color: #fff; font: 600 16px/1 system-ui;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.5); pointer-events: none;
  transition: opacity var(--ease), transform var(--ease);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.wiggle .delete-btn { opacity: 1; transform: scale(1); pointer-events: auto; }
.delete-btn:hover { background: #FF3B30; }

.widget-title {
  font: 600 13px/1 system-ui; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--accent); margin-bottom: 12px;
}

.widget-body { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--dim); font-size: 15px; }

/* Empty state */
.empty-card {
  grid-column: 1 / -1;
  min-height: 280px;
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; cursor: pointer;
  transition: border-color var(--ease), background var(--ease);
}
.empty-card:hover { border-color: var(--dim); background: rgba(255,255,255,0.02); }
.empty-icon { font-size: 48px; opacity: 0.5; margin-bottom: 16px; }
.empty-text { font: 500 17px system-ui; color: var(--muted); margin-bottom: 8px; }
.empty-hint { font-size: 13px; color: var(--dim); }

/* FAB */
.fab {
  position: fixed; right: var(--gap); bottom: var(--gap);
  width: var(--fab); height: var(--fab); border-radius: 50%;
  background: var(--text); color: var(--bg); border: none;
  font-size: 24px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: var(--shadow); z-index: 50;
  transition: transform var(--ease), background var(--ease);
}
.fab:hover { background: var(--muted); }
.fab:active { transform: scale(0.95); }
.fab.done { background: #FF3B30; color: #fff; }

/* Modal */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 100; display: none; align-items: center; justify-content: center;
  padding: var(--gap); opacity: 0; transition: opacity var(--ease);
}
.overlay.open { display: flex; opacity: 1; }

.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px;
  max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto;
  transform: scale(0.95) translateY(20px); transition: transform 300ms var(--ease);
}
.overlay.open .modal { transform: scale(1) translateY(0); }

.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font: 600 20px system-ui; }
.modal-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--ease), color var(--ease);
}
.modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.picker-item {
  background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer; transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
  position: relative; overflow: hidden;
}
.picker-item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); opacity: 0; transition: opacity var(--ease); }
.picker-item:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow); }
.picker-item:hover::before { opacity: 1; }
.picker-icon { font-size: 28px; }
.picker-name { font: 500 15px system-ui; text-align: center; }
.picker-size { font: 600 11px system-ui; color: var(--dim); text-transform: uppercase; letter-spacing: 0.3px; }

/* Settings in modal */
.settings-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 16px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font: 15px system-ui; cursor: pointer;
  margin-bottom: 8px; transition: background var(--ease), border-color var(--ease);
}
.settings-btn:last-child { margin-bottom: 0; }
.settings-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--dim); }
.settings-btn.danger { color: #FF3B30; }
.settings-btn.danger:hover { background: rgba(255,59,48,0.1); border-color: #FF3B30; }
.section-title { font: 600 13px system-ui; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); margin: 24px 0 12px; }
.section-title:first-child { margin-top: 0; }

/* Toast */
.toast { position: fixed; left: 50%; bottom: calc(var(--gap) + var(--fab) + 16px); transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 20px; box-shadow: var(--shadow); font: 500 14px system-ui;
  opacity: 0; z-index: 200; pointer-events: none;
  animation: toast-in 0.3s var(--ease) forwards; }
.toast.success { border-left: 3px solid #34C759; }
.toast.error { border-left: 3px solid #FF3B30; }
@keyframes toast-in { to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.toast.hide { animation: toast-out 0.2s ease forwards; }
@keyframes toast-out { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* Focus */
:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app">
  <div class="grid" id="grid" role="list" aria-label="Widget grid"></div>
  <button class="fab" id="fab" aria-label="Add widget" title="Click: add widget • Double-click: wiggle mode">+</button>
</div>

<div class="overlay" id="pickerModal" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="pickerTitle">Add Widget</h2>
      <button class="modal-close" id="pickerClose" aria-label="Close">&times;</button>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'oxy-dashboard-v1';
const ACCENTS = ['#007AFF','#34C759','#FF9F0A','#FF3B30','#AF52DE','#FF2D92','#5AC8FA','#5856D6'];

const WIDGETS = [
  {id:'clock', name:'Clock', icon:'🕐', size:'1×1', desc:'Time, date, timezone'},
  {id:'weather', name:'Weather', icon:'☀️', size:'1×2', desc:'Current conditions, forecast'},
  {id:'calendar', name:'Calendar', icon:'📅', size:'2×2', desc:'Events, reminders'},
  {id:'notes', name:'Notes', icon:'📝', size:'2×2', desc:'Quick notes, markdown'},
  {id:'habits', name:'Habits', icon:'🔥', size:'2×1', desc:'Streaks, daily tracking'},
  {id:'finance', name:'Finance', icon:'💰', size:'1×2', desc:'Expenses, budgets'},
  {id:'news', name:'News', icon:'📰', size:'2×2', desc:'RSS feeds, headlines'},
  {id:'timer', name:'Timer', icon:'⏱️', size:'1×1', desc:'Pomodoro, stopwatch'},
];

// --- Utils ---
const $ = (s, c=document) => c.querySelector(s);
const $$ = (s, c=document) => [...c.querySelectorAll(s)];
const uid = () => crypto.randomUUID();
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 200); }, 2500);
}

function saveJSON(data, name) {
  const url = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// --- State ---
const state = {
  widgets: [],
  nextAccent: 0,
  wiggle: false,
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      this.widgets = d.widgets || [];
      this.nextAccent = d.nextAccent || 0;
      this.wiggle = d.wiggle || false;
      this.widgets.sort((a,b) => (a.order||0) - (b.order||0));
    } catch { this.reset(); }
  },
  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 1, widgets: this.widgets, nextAccent: this.nextAccent, wiggle: this.wiggle, updatedAt: Date.now()
    }));
  },
  debouncedSave: debounce(function() { this.save(); }, 300),
  reset() { this.widgets = []; this.nextAccent = 0; this.wiggle = false; this.save(); },
  add(typeId) {
    const t = WIDGETS.find(w => w.id === typeId); if (!t) return;
    const w = { id: uid(), type: typeId, config: {}, accent: ACCENTS[this.nextAccent++ % ACCENTS.length], order: this.widgets.length };
    this.widgets.push(w); this.debouncedSave(); return w;
  },
  remove(id) { this.widgets = this.widgets.filter(w => w.id !== id); this.debouncedSave(); },
  reorder(ids) {
    const map = new Map(this.widgets.map(w => [w.id, w]));
    this.widgets = ids.map(id => map.get(id)).filter(Boolean);
    this.widgets.forEach((w,i) => w.order = i);
    this.debouncedSave();
  },
  toggleWiggle() { this.wiggle = !this.wiggle; this.debouncedSave(); return this.wiggle; },
  export() { return { version: 1, widgets: this.widgets, nextAccent: this.nextAccent, exportedAt: new Date().toISOString() }; },
  import(data) {
    if (!data || data.version !== 1) throw new Error('Invalid file');
    this.widgets = data.widgets || [];
    this.nextAccent = data.nextAccent || 0;
    this.widgets.sort((a,b) => (a.order||0) - (b.order||0));
    this.save();
  }
};

state.load();

// --- UI ---
const grid = $('#grid'), fab = $('#fab'), pickerModal = $('#pickerModal'), pickerGrid = $('#pickerGrid');

function render() {
  grid.innerHTML = '';
  if (state.widgets.length === 0) {
    grid.innerHTML = `
      <div class="empty-card" onclick="app.openPicker()">
        <div class="empty-icon">+</div>
        <div class="empty-text">Add Your First Widget</div>
        <div class="empty-hint">Click the + button or this card</div>
      </div>`;
    return;
  }
  state.widgets.forEach((w, i) => {
    const t = WIDGETS.find(x => x.id === w.type);
    const el = document.createElement('div');
    el.className = 'widget';
    el.dataset.id = w.id;
    el.style.setProperty('--accent', w.accent);
    el.style.setProperty('--i', i);
    el.draggable = state.wiggle;
    el.innerHTML = `
      <button class="delete-btn" aria-label="Delete ${t?.name}">×</button>
      <div class="widget-title" style="color:${w.accent}">${t?.name || w.type}</div>
      <div class="widget-body">${t?.desc || 'Widget content in V2'}</div>
    `;
    el.querySelector('.delete-btn').onclick = e => { e.stopPropagation(); app.delete(w.id); };
    grid.appendChild(el);
    bindDrag(el, w);
  });
}

function renderPicker() {
  pickerGrid.innerHTML = '';
  WIDGETS.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.style.setProperty('--accent', ACCENTS[i % ACCENTS.length]);
    el.innerHTML = `<div class="picker-icon">${t.icon}</div><div class="picker-name">${t.name}</div><div class="picker-size">${t.size}</div>`;
    el.onclick = () => app.addWidget(t.id);
    pickerGrid.appendChild(el);
  });
}

// --- Drag (native HTML5 DnD - simpler than pointer events) ---
let dragEl = null;
function bindDrag(el, widget) {
  el.addEventListener('dragstart', e => {
    if (!state.wiggle) return e.preventDefault();
    dragEl = widget;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', e => {
    el.classList.remove('dragging');
    dragEl = null;
  });
  el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    const target = e.target.closest('.widget');
    if (target && target !== el) {
      const ids = $$('.widget').map(x => x.dataset.id);
      const from = ids.indexOf(dragEl.id), to = ids.indexOf(target.dataset.id);
      ids.splice(from, 1); ids.splice(to, 0, dragEl.id);
      state.reorder(ids); render();
    }
  });
}

// --- App controller ---
const app = {
  openPicker() { renderPicker(); pickerModal.classList.add('open'); document.body.style.overflow = 'hidden'; },
  closePicker() { pickerModal.classList.remove('open'); document.body.style.overflow = ''; },
  addWidget(typeId) {
    state.add(typeId); this.closePicker(); render(); toast(`Added ${WIDGETS.find(w=>w.id===typeId)?.name} widget`);
  },
  delete(id) {
    if (!confirm('Delete this widget?')) return;
    state.remove(id); render(); toast('Widget deleted');
  },
  toggleWiggle() {
    const on = state.toggleWiggle();
    document.body.classList.toggle('wiggle', on);
    fab.classList.toggle('done', on);
    fab.textContent = on ? '✓' : '+';
    fab.setAttribute('aria-label', on ? 'Done' : 'Add widget');
    $$('.widget').forEach(w => w.draggable = on);
    toast(on ? 'Wiggle mode — drag to reorder, tap × to delete' : 'Wiggle mode off');
  },
  export() { saveJSON(state.export(), `oxy-dashboard-${new Date().toISOString().split('T')[0]}.json`); toast('Exported'); },
  import(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      try { state.import(JSON.parse(e.target.result)); render(); toast('Imported'); }
      catch { toast('Import failed', 'error'); }
    };
    r.readAsText(file);
  },
  clear() {
    if (!confirm('Delete ALL data? Cannot undo.')) return;
    state.reset(); render(); toast('Cleared');
  }
};

// --- Events ---
fab.addEventListener('click', e => {
  const now = Date.now();
  if (now - (fab._last||0) < 300) { e.preventDefault(); app.toggleWiggle(); }
  else { app.openPicker(); }
  fab._last = now;
});

let lp; ['pointerdown'].forEach(e => fab.addEventListener(e, () => lp = setTimeout(() => app.toggleWiggle(), 500)));
['pointerup','pointerleave','pointercancel'].forEach(e => fab.addEventListener(e, () => clearTimeout(lp)));

$('#pickerClose').onclick = () => app.closePicker();
pickerModal.onclick = e => { if (e.target === pickerModal) app.closePicker(); };

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') app.closePicker();
  if ((e.metaKey||e.ctrlKey) && e.key === 'e') { e.preventDefault(); app.export(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'i') { e.preventDefault(); $('#importFile').click(); }
  if (e.key === ' ' && e.target === fab) { e.preventDefault(); app.toggleWiggle(); }
});

// Settings buttons (inline in picker modal for simplicity)
function addSettings() {
  const div = document.createElement('div');
  div.style.marginTop = '24px';
  div.innerHTML = `
    <div class="section-title">Data</div>
    <button class="settings-btn" onclick="app.export()">Export Dashboard <kbd>⌘E</kbd></button>
    <button class="settings-btn" onclick="$('#importFile').click()">Import Dashboard <kbd>⌘I</kbd></button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="app.import(this.files[0])">
    <button class="settings-btn danger" onclick="app.clear()">Clear All Data</button>
    <div class="section-title">Info</div>
    <button class="settings-btn" disabled>Version 1.0.0</button>
  `;
  pickerGrid.parentNode.appendChild(div);
}
addSettings();

// --- Init ---
render();
document.body.classList.toggle('wiggle', state.wiggle);
fab.classList.toggle('done', state.wiggle);
fab.textContent = state.wiggle ? '✓' : '+';
$$('.widget').forEach(w => w.draggable = state.wiggle);
</script>
</body>
</html>
